name: Release single-file raffle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - run: npm ci
      - run: npm run verify

      - name: Prepare release files
        shell: bash
        run: |
          cp dist/index.html "kaspa-raffle-static-${GITHUB_REF_NAME}.html"
          sha256sum "kaspa-raffle-static-${GITHUB_REF_NAME}.html" > "kaspa-raffle-static-${GITHUB_REF_NAME}.html.sha256"

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "kaspa-raffle-static-${GITHUB_REF_NAME}.html" \
            "kaspa-raffle-static-${GITHUB_REF_NAME}.html.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Kaspa Raffle ${GITHUB_REF_NAME}" \
            --generate-notes \
            --prerelease
