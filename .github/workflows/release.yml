name: Release single-file raffle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Check out pinned SilverScript
        shell: bash
        run: |
          git clone https://github.com/kaspanet/silverscript.git .tools/silverscript
          git -C .tools/silverscript checkout d25bd3427a093c17327ca3d6b9e1aa5f7688c863
          git -C .tools/silverscript apply ../../patches/silverscript-opblake2b-with-key.patch

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .tools/silverscript

      - name: Build pinned SilverScript tools
        shell: bash
        run: |
          cargo build --manifest-path .tools/silverscript/Cargo.toml -p silverscript-lang --bin silverc
          cargo build --manifest-path .tools/silverscript/Cargo.toml -p cli-debugger --bin cli-debugger

      - run: npm ci
      - run: npm run compile:contract
      - run: npm run verify

      - name: Verify standalone indexer container
        run: docker build --tag kaspa-raffle-indexer:verify indexer

      - name: Prepare release files
        shell: bash
        run: |
          cp dist/index.html "kaspa-raffle-static-${GITHUB_REF_NAME}.html"
          tar -czf "kaspa-raffle-indexer-${GITHUB_REF_NAME}.tar.gz" \
            -C indexer package.json package-lock.json raffle-indexer.mjs Dockerfile README.md .dockerignore
          sha256sum "kaspa-raffle-static-${GITHUB_REF_NAME}.html" > "kaspa-raffle-static-${GITHUB_REF_NAME}.html.sha256"
          sha256sum "kaspa-raffle-indexer-${GITHUB_REF_NAME}.tar.gz" > "kaspa-raffle-indexer-${GITHUB_REF_NAME}.tar.gz.sha256"

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "kaspa-raffle-static-${GITHUB_REF_NAME}.html" \
            "kaspa-raffle-static-${GITHUB_REF_NAME}.html.sha256" \
            "kaspa-raffle-indexer-${GITHUB_REF_NAME}.tar.gz" \
            "kaspa-raffle-indexer-${GITHUB_REF_NAME}.tar.gz.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Kaspa Raffle ${GITHUB_REF_NAME}" \
            --generate-notes \
            --prerelease
