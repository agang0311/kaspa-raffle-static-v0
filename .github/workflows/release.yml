name: Release single-file raffle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Check out pinned SilverScript
        shell: bash
        run: |
          git clone https://github.com/kaspanet/silverscript.git .tools/silverscript
          git -C .tools/silverscript checkout d25bd3427a093c17327ca3d6b9e1aa5f7688c863

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .tools/silverscript

      - name: Build pinned SilverScript debugger
        shell: bash
        run: cargo build --manifest-path .tools/silverscript/Cargo.toml -p cli-debugger

      - run: npm ci
      - run: npm run verify

      - name: Prepare release files
        shell: bash
        run: |
          cp dist/index.html "kaspa-raffle-static-${GITHUB_REF_NAME}.html"
          sha256sum "kaspa-raffle-static-${GITHUB_REF_NAME}.html" > "kaspa-raffle-static-${GITHUB_REF_NAME}.html.sha256"

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "kaspa-raffle-static-${GITHUB_REF_NAME}.html" \
            "kaspa-raffle-static-${GITHUB_REF_NAME}.html.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Kaspa Raffle ${GITHUB_REF_NAME}" \
            --generate-notes \
            --prerelease
