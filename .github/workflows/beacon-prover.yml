name: Beacon prover

on:
  workflow_dispatch:
  push:
    branches:
      - agent/million-user-v4
    paths:
      - "beacon-prover/**"
      - ".github/workflows/beacon-prover.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            beacon-prover/target
          key: ${{ runner.os }}-risc0-3.0.4-${{ hashFiles('beacon-prover/**/Cargo.lock', 'beacon-prover/**/Cargo.toml') }}

      - name: Install RISC Zero toolchain
        shell: bash
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          "$HOME/.risc0/bin/rzup" install

      - name: Build drand guest
        id: guest
        continue-on-error: true
        env:
          RISC0_GUEST_LOGFILE: /dev/stderr
        shell: bash
        run: |
          set -o pipefail
          cargo build --release --manifest-path beacon-prover/Cargo.toml -p kaspa-raffle-beacon-methods 2>&1 \
            | tee beacon-prover/guest-build.log

      - name: Build prover host
        id: host
        if: steps.guest.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo build --release --manifest-path beacon-prover/Cargo.toml -p kaspa-raffle-beacon-prover 2>&1 \
            | tee beacon-prover/host-build.log

      - name: Publish build diagnostics
        if: always()
        shell: bash
        run: |
          {
            echo '## Beacon prover build'
            echo
            echo "Guest: ${{ steps.guest.outcome }}"
            echo "Host: ${{ steps.host.outcome }}"
            for log in beacon-prover/guest-build.log beacon-prover/host-build.log; do
              if [[ -f "$log" ]]; then
                echo
                echo "### $(basename "$log")"
                echo '```text'
                tail -n 160 "$log"
                echo '```'
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Export guest image ID
        if: steps.host.outcome == 'success'
        shell: bash
        run: beacon-prover/target/release/kaspa-raffle-beacon-prover image-id | tee beacon-prover/image-id.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kaspa-raffle-drand-build
          path: |
            beacon-prover/image-id.txt
            beacon-prover/*-build.log
            beacon-prover/target/release/kaspa-raffle-beacon-prover
