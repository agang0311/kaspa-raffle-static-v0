name: Beacon prover

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      prove:
        description: Generate a succinct receipt
        type: boolean
        default: true
      round:
        description: Quicknet round to prove
        type: string
        default: "123"
      signature:
        description: Quicknet signature (96 lowercase hex characters)
        type: string
        default: b75c69d0b72a5d906e854e808ba7e2accb1542ac355ae486d591aa9d43765482e26cd02df835d3546d23c4b13e0dfc92
  push:
    branches:
      - agent/million-user-v4
    paths:
      - "beacon-prover/**"
      - ".github/workflows/beacon-prover.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            beacon-prover/target
          key: ${{ runner.os }}-risc0-3.0.5-${{ hashFiles('beacon-prover/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-risc0-3.0.5-
            ${{ runner.os }}-risc0-3.0.4-

      - name: Install RISC Zero toolchain
        shell: bash
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          "$HOME/.risc0/bin/rzup" install

      - name: Build drand guest
        id: guest
        continue-on-error: true
        env:
          RISC0_GUEST_LOGFILE: /dev/stderr
        shell: bash
        run: |
          set -o pipefail
          cargo build --release --manifest-path beacon-prover/Cargo.toml -p kaspa-raffle-beacon-methods 2>&1 \
            | tee beacon-prover/guest-build.log

      - name: Build prover host
        id: host
        if: steps.guest.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo build --release --manifest-path beacon-prover/Cargo.toml -p kaspa-raffle-beacon-prover 2>&1 \
            | tee beacon-prover/host-build.log

      - name: Publish build diagnostics
        if: always()
        shell: bash
        run: |
          {
            echo '## Beacon prover build'
            echo
            echo "Guest: ${{ steps.guest.outcome }}"
            echo "Host: ${{ steps.host.outcome }}"
            for log in beacon-prover/guest-build.log beacon-prover/host-build.log; do
              if [[ -f "$log" ]]; then
                echo
                echo "### $(basename "$log")"
                echo '```text'
                tail -n 160 "$log"
                echo '```'
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

          annotate_failure() {
            local title="$1"
            local file="$2"
            local log="$3"
            [[ -f "$log" ]] || return 0
            local message
            message="$(tail -n 120 "$log")"
            message="${message//'%'/'%25'}"
            message="${message//$'\r'/'%0D'}"
            message="${message//$'\n'/'%0A'}"
            echo "::error file=$file,title=$title::$message"
          }

          if [[ "${{ steps.guest.outcome }}" != success ]]; then
            annotate_failure "RISC Zero guest build failed" \
              "beacon-prover/methods/guest/src/main.rs" \
              "beacon-prover/guest-build.log"
          fi
          if [[ "${{ steps.host.outcome }}" == failure ]]; then
            annotate_failure "Beacon prover host build failed" \
              "beacon-prover/host/src/main.rs" \
              "beacon-prover/host-build.log"
          fi

      - name: Export guest image ID
        id: image
        if: steps.host.outcome == 'success'
        shell: bash
        run: |
          image_id="$(beacon-prover/target/release/kaspa-raffle-beacon-prover image-id)"
          echo "$image_id" | tee beacon-prover/image-id.txt
          echo "::notice file=beacon-prover/image-id.txt,title=Drand guest image ID::$image_id"

      - name: Execute known quicknet beacon
        id: execute
        if: steps.host.outcome == 'success'
        shell: bash
        run: |
          execution="$(beacon-prover/target/release/kaspa-raffle-beacon-prover execute \
            123 \
            b75c69d0b72a5d906e854e808ba7e2accb1542ac355ae486d591aa9d43765482e26cd02df835d3546d23c4b13e0dfc92)"
          echo "$execution" | tee beacon-prover/execution.json
          echo "::notice file=beacon-prover/execution.json,title=Drand guest execution::$execution"

      - name: Resolve proof request
        id: request
        if: steps.execute.outcome == 'success'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == workflow_dispatch && "${{ inputs.prove }}" == true ]]; then
            round='${{ inputs.round }}'
            signature='${{ inputs.signature }}'
          elif [[ "${{ github.event_name }}" == push && -f beacon-prover/prove-request.json ]]; then
            round="$(jq -r '.round' beacon-prover/prove-request.json)"
            signature="$(jq -r '.signature' beacon-prover/prove-request.json)"
          else
            exit 0
          fi
          if [[ ! "$round" =~ ^[0-9]+$ ]] || [[ ! "$signature" =~ ^[0-9a-f]{96}$ ]]; then
            echo "Invalid quicknet round or signature" >&2
            exit 2
          fi
          echo "round=$round" >> "$GITHUB_OUTPUT"
          echo "signature=$signature" >> "$GITHUB_OUTPUT"

      - name: Prove requested quicknet beacon
        id: prove
        if: steps.request.outputs.round != ''
        continue-on-error: true
        timeout-minutes: 360
        shell: bash
        run: |
          set -o pipefail
          round='${{ steps.request.outputs.round }}'
          signature='${{ steps.request.outputs.signature }}'
          /usr/bin/time -v beacon-prover/target/release/kaspa-raffle-beacon-prover \
            "$round" \
            "$signature" \
            "beacon-prover/proof-$round.json" \
            2>&1 | tee beacon-prover/prove.log

      - name: Publish proof diagnostics
        if: always() && steps.prove.outcome != 'skipped'
        shell: bash
        run: |
          if [[ "${{ steps.prove.outcome }}" == success ]]; then
            proof_file="beacon-prover/proof-${{ steps.request.outputs.round }}.json"
            proof_bytes="$(wc -c < "$proof_file")"
            seal_bytes="$(jq -r '.seal | length / 2' "$proof_file")"
            echo "::notice file=$proof_file,title=Drand succinct proof::round=${{ steps.request.outputs.round }} proof_bytes=$proof_bytes seal_bytes=$seal_bytes"
          elif [[ -f beacon-prover/prove.log ]]; then
            message="$(tail -n 120 beacon-prover/prove.log)"
            message="${message//'%'/'%25'}"
            message="${message//$'\r'/'%0D'}"
            message="${message//$'\n'/'%0A'}"
            echo "::error file=beacon-prover/host/src/main.rs,title=Drand succinct proving failed::$message"
          fi

      - name: Cache pushed proof
        if: github.event_name == 'push' && steps.prove.outcome == 'success'
        shell: bash
        run: |
          round='${{ steps.request.outputs.round }}'
          mkdir -p beacon-prover/proofs
          mv "beacon-prover/proof-$round.json" "beacon-prover/proofs/$round.json"
          rm beacon-prover/prove-request.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add beacon-prover/proofs beacon-prover/prove-request.json
          git commit -m "Cache drand proof for round $round"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kaspa-raffle-drand-build
          path: |
            beacon-prover/image-id.txt
            beacon-prover/execution.json
            beacon-prover/proof-*.json
            beacon-prover/proofs/*.json
            beacon-prover/prove.log
            beacon-prover/*-build.log
            beacon-prover/target/release/kaspa-raffle-beacon-prover

      - name: Enforce successful build
        if: always() && (steps.guest.outcome != 'success' || steps.host.outcome != 'success' || steps.image.outcome != 'success' || steps.execute.outcome != 'success' || (steps.request.outputs.round != '' && steps.prove.outcome != 'success'))
        shell: bash
        run: exit 1
